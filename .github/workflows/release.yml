name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Bump version, tag and release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # o postinstall instala também as deps de web/
        run: npm ci

      - name: Build (validate before tagging)
        # garante que a tag não é criada se o build estiver quebrado
        run: npm run build

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.bump }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.bump.outputs.version }}"

      - name: Create and push tag
        run: |
          git tag ${{ steps.bump.outputs.version }}
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Build changelog since last tag
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD^)
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG"        >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.log }}

            ---
            > Published automatically by the Release workflow.
          draft: false
          prerelease: false

  publish:
    name: Publish to npm
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      # publica exatamente o commit da tag criada acima
      ref: ${{ needs.release.outputs.version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
