name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate on Node.js 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # o postinstall instala também as deps de web/
        run: npm ci

      - name: Build (web + api ofuscada em dist/)
        run: npm run build

      - name: Verify package files (dry-run pack)
        # --ignore-scripts evita que o prepack rode o build de novo
        run: npm pack --dry-run --ignore-scripts

      - name: Smoke test dist
        run: node dist/agent-flow.js --version
