name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v2.1.3
  workflow_call:      # allows being called from release.yml
    inputs:
      ref:
        description: 'Git ref (tag) to publish'
        required: false
        type: string
    secrets:
      NPM_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Build, validate and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # quando chamado pelo release.yml, faz checkout da tag recém-criada
          # (o SHA default do workflow_call é anterior ao commit de bump)
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && npm ci --prefix web

      - name: Build (web + api ofuscada em dist/)
        run: npm run build

      - name: Verify package contents
        # --ignore-scripts evita que o prepack rode o build de novo
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
